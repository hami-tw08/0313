<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 花言葉しらべ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink:#FF5DAB; --pink2:#FF8CC8; --purple:#A855F7; --purple2:#C084FC;
    --coral:#FF7E5F; --bg:#FFF0F8; --text:#3D0059; --muted:#9B5CA0; --border:#F0ABFC;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family:'Zen Maru Gothic',sans-serif;
    background:var(--bg);
    background-image:
      radial-gradient(circle at 10% 15%,rgba(255,93,171,.13) 0%,transparent 50%),
      radial-gradient(circle at 90% 80%,rgba(168,85,247,.12) 0%,transparent 50%);
    min-height:100vh; color:var(--text); overflow-x:hidden;
  }
  .blob { position:fixed; border-radius:50%; filter:blur(55px); pointer-events:none; z-index:0; animation:blob-drift 10s ease-in-out infinite alternate; }
  .blob:nth-child(1){ width:300px;height:300px;background:rgba(255,93,171,.14);top:-80px;left:-80px;animation-duration:9s; }
  .blob:nth-child(2){ width:260px;height:260px;background:rgba(168,85,247,.12);bottom:-60px;right:-60px;animation-duration:12s;animation-delay:-4s; }
  .blob:nth-child(3){ width:180px;height:180px;background:rgba(255,209,102,.11);top:38%;left:65%;animation-duration:14s;animation-delay:-6s; }
  @keyframes blob-drift { from{transform:translate(0,0) scale(1)} to{transform:translate(18px,28px) scale(1.06)} }
  .wrap { position:relative;z-index:1;max-width:600px;margin:0 auto;padding:32px 20px 80px; }
  header { text-align:center;margin-bottom:32px;animation:fade-up .7s ease both; }
  .logo-pill {
    display:inline-flex;align-items:center;gap:8px;background:white;
    border:2px solid var(--border);border-radius:40px;padding:6px 18px;
    font-size:13px;font-weight:700;color:var(--pink);margin-bottom:14px;
    box-shadow:0 2px 16px rgba(255,93,171,.18);animation:pop .5s cubic-bezier(.17,.67,.36,1.4) .2s both;
  }
  h1 {
    font-family:'Pacifico',cursive;font-size:38px;
    background:linear-gradient(135deg,var(--pink) 0%,var(--purple) 60%,var(--coral) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    line-height:1.2;margin-bottom:8px;
  }
  .header-sub { font-size:14px;color:var(--muted);font-weight:500; }
  .search-card {
    background:white;border-radius:24px;padding:24px;border:2px solid var(--border);
    box-shadow:0 8px 32px rgba(255,93,171,.11);margin-bottom:28px;animation:fade-up .7s ease .1s both;
  }
  .search-label { font-size:13px;font-weight:700;color:var(--pink);margin-bottom:12px;display:flex;align-items:center;gap:6px; }
  .search-row { display:flex;gap:10px;margin-bottom:16px; }
  input[type="text"] {
    flex:1;background:#FFF0F8;border:2px solid #FBCFE8;border-radius:16px;
    padding:12px 18px;font-size:16px;font-weight:700;color:var(--text);
    font-family:'Zen Maru Gothic',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;
  }
  input[type="text"]:focus { border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,93,171,.12); }
  input[type="text"]::placeholder { color:#F9A8D4;font-weight:400; }
  .btn-search {
    background:linear-gradient(135deg,var(--pink),var(--purple));color:white;border:none;
    border-radius:16px;padding:12px 22px;font-size:15px;font-weight:700;
    font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;white-space:nowrap;
    box-shadow:0 4px 16px rgba(168,85,247,.35);transition:transform .15s,box-shadow .15s;
  }
  .btn-search:hover { transform:translateY(-2px);box-shadow:0 6px 20px rgba(168,85,247,.45); }
  .btn-search:active { transform:scale(.97); }
  .quick-tags { display:flex;flex-wrap:wrap;gap:8px; }
  .qtag {
    background:#FDF2F8;border:1.5px solid #F9A8D4;border-radius:20px;
    padding:5px 14px;font-size:13px;font-weight:700;color:#DB2777;
    cursor:pointer;transition:background .15s,transform .1s;
  }
  .qtag:hover { background:#FCE7F3;transform:scale(1.05); }
  #loading { display:none;text-align:center;padding:40px 20px;animation:fade-up .4s ease both; }
  .spinner {
    width:52px;height:52px;border:4px solid #FBCFE8;border-top-color:var(--pink);
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;
  }
  .loading-text { font-size:15px;font-weight:700;color:var(--muted); }
  @keyframes spin { to{transform:rotate(360deg)} }
  #error-box {
    display:none;background:#FFF0F0;border:2px solid #FECACA;border-radius:18px;
    padding:18px 22px;color:#DC2626;font-size:14px;font-weight:500;
    margin-bottom:20px;line-height:1.7;animation:fade-up .4s ease both;
  }
  #result { display:none;animation:fade-up .6s ease both; }
  .result-card {
    background:white;border-radius:28px;overflow:hidden;border:2.5px solid var(--border);
    box-shadow:0 10px 40px rgba(192,38,211,.13);margin-bottom:20px;
  }
  .img-hero {
    position:relative;background:linear-gradient(145deg,#FDF4FF,#FCE7F3,#EDE9FE);
    padding:36px 20px 24px;display:flex;flex-direction:column;align-items:center;
  }
  .web-badge {
    position:absolute;top:14px;right:14px;
    background:linear-gradient(135deg,var(--pink),var(--coral));
    color:white;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;
    box-shadow:0 2px 8px rgba(255,93,171,.4);
  }
  .main-img-wrap {
    width:190px;height:190px;border-radius:50%;overflow:hidden;border:5px solid white;
    box-shadow:0 8px 28px rgba(192,38,211,.22);margin-bottom:18px;
    background:linear-gradient(135deg,#FCA5D3,#C084FC);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:transform .3s;position:relative;
  }
  .main-img-wrap:hover { transform:scale(1.03); }
  #main-img { width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0; }
  .img-emoji { font-size:84px;line-height:1;position:relative;z-index:1; }
  .flower-name-jp { font-size:26px;font-weight:900;color:#6B21A8;margin-bottom:4px;text-align:center; }
  .flower-name-en { font-size:13px;color:var(--muted);font-weight:500;text-align:center;min-height:18px; }
  .thumb-row { display:flex;gap:10px;margin-top:18px;justify-content:center;flex-wrap:wrap; }
  .thumb {
    width:68px;height:68px;border-radius:14px;overflow:hidden;border:2.5px solid #F0ABFC;
    cursor:pointer;background:linear-gradient(135deg,#FDF4FF,#FCE7F3);
    flex-shrink:0;transition:border-color .2s,transform .15s,box-shadow .15s;
  }
  .thumb:hover { transform:scale(1.08);box-shadow:0 4px 14px rgba(168,85,247,.28); }
  .thumb.active { border-color:var(--purple);box-shadow:0 0 0 3px rgba(168,85,247,.22); }
  .thumb img { width:100%;height:100%;object-fit:cover;display:block; }
  .photo-credit { font-size:11px;color:var(--muted);margin-top:10px;text-align:center;min-height:16px; }
  .photo-credit a { color:var(--purple);text-decoration:none; }
  .photo-credit a:hover { text-decoration:underline; }
  .result-body { padding:24px; }
  .section-label { display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--pink);margin-bottom:12px; }
  .label-dot { width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));flex-shrink:0; }
  .kotoba-badges { display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px; }
  .kotoba-badge {
    background:linear-gradient(135deg,var(--pink),var(--purple));color:white;
    border-radius:20px;padding:6px 16px;font-size:14px;font-weight:700;
    box-shadow:0 2px 10px rgba(168,85,247,.28);animation:pop .4s cubic-bezier(.17,.67,.36,1.4) both;
  }
  .desc-box {
    background:linear-gradient(135deg,#FAF5FF,#FDF2F8);border-radius:16px;padding:16px 18px;
    font-size:14px;line-height:1.9;color:#5B21B6;border-left:4px solid var(--purple2);margin-bottom:18px;
  }
  .divider { border:none;border-top:2px dashed var(--border);margin:16px 0; }
  .source-row { display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted); }
  .source-dot { width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));flex-shrink:0; }
  .action-row { display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:24px; }
  .btn-action {
    background:white;border:2px solid var(--border);border-radius:16px;padding:11px 18px;
    font-size:14px;font-weight:700;color:var(--purple);cursor:pointer;
    font-family:'Zen Maru Gothic',sans-serif;display:flex;align-items:center;gap:6px;
    transition:background .15s,transform .1s,box-shadow .15s;box-shadow:0 2px 10px rgba(168,85,247,.1);
  }
  .btn-action:hover { background:#FAF5FF;transform:translateY(-2px);box-shadow:0 4px 14px rgba(168,85,247,.18); }
  .btn-action:active { transform:scale(.97); }
  .btn-action.fav { background:linear-gradient(135deg,var(--pink),var(--purple));color:white;border-color:transparent;box-shadow:0 4px 16px rgba(168,85,247,.35); }
  .btn-action.fav:hover { box-shadow:0 6px 20px rgba(168,85,247,.45); }
  #fav-section { display:none;margin-bottom:24px;animation:fade-up .5s ease both; }
  .fav-title { font-size:15px;font-weight:700;color:var(--pink);margin-bottom:12px;display:flex;align-items:center;gap:8px; }
  .fav-list { display:flex;flex-wrap:wrap;gap:8px; }
  .fav-item {
    background:white;border:2px solid var(--border);border-radius:16px;padding:7px 14px;
    font-size:13px;font-weight:700;color:var(--purple);cursor:pointer;
    transition:background .15s,transform .1s;display:flex;align-items:center;gap:6px;
  }
  .fav-item:hover { background:#FAF5FF;transform:scale(1.04); }
  .fav-remove { color:#F9A8D4;font-size:14px;line-height:1;cursor:pointer; }
  .fav-remove:hover { color:var(--pink); }
  footer { text-align:center;font-size:12px;color:#C084FC;margin-top:20px;line-height:1.9; }
  footer a { color:var(--muted); }
  @keyframes fade-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pop { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
  @media(max-width:480px){ h1{font-size:30px} .main-img-wrap{width:150px;height:150px} .wrap{padding:24px 14px 60px} }
</style>
</head>
<body>
<div class="blob"></div>
<div class="blob"></div>

<div class="wrap">
  <header>
    <div class="logo-pill">🌸 Hana Kotoba</div>
    <h1>花言葉しらべ</h1>

  <div class="search-card">

    <div class="quick-tags">

      <span class="qtag" onclick="quickSearch('チューリップ')">🌷 チューリップ</span>
      <span class="qtag" onclick="quickSearch('ひまわり')">🌻 ひまわり</span>
      <span class="qtag" onclick="quickSearch('カーネーション')">🌺 カーネーション</span>
      <span class="qtag" onclick="quickSearch('あじさい')">💠 あじさい</span>
      <span class="qtag" onclick="quickSearch('ラベンダー')">💜 ラベンダー</span>
      <span class="qtag" onclick="quickSearch('コスモス')">🌺 コスモス</span>
    </div>
  </div>
  <div id="loading"><div class="spinner"></div><p class="loading-text">お花の情報を集めています… 🌿</p></div>
  <div id="error-box"></div>
  <div id="result">
    <div class="result-card">
      <div class="img-hero">
        <div class="web-badge">花言葉 ✦</div>
        <div class="main-img-wrap">

        <div class="photo-credit" id="photo-credit"></div>
      </div>
      <div class="result-body">
        <div class="section-label"><div class="label-dot"></div><span>花言葉</span></div>
        <div class="kotoba-badges" id="kotoba-badges"></div>
        <div class="desc-box" id="desc-box">—</div>
        <hr class="divider">
        <div class="source-row"><div class="source-dot"></div><span id="source-text">出典：内蔵花言葉データベース</span></div>
      </div>
    </div>
    <div class="action-row">
      <button class="btn-action fav" onclick="toggleFav()"><span id="fav-icon">♡</span><span id="fav-label">お気に入りに追加</span></button>
      <button class="btn-action" onclick="shareResult()">↗ 共有する</button>
      <button class="btn-action" onclick="clearResult()">✦ 別の花を見る</button>
    </div>
  </div>
  <div id="fav-section">
    <div class="fav-title">♡ お気に入りの花</div>
    <div class="fav-list" id="fav-list"></div>
  </div>
  <footer>
    花言葉：内蔵データベース（200種）より表示 ／
    画像：<a href="https://unsplash.com" target="_blank">Unsplash</a>
  </footer>
</div>

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  🔧 ユーティリティ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ひらがな⇔カタカナ変換
function toKatakana(s){ return s.replace(/[\u3041-\u3096]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60)); }
function toHiragana(s){ return s.replace(/[\u30A1-\u30F6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60)); }

// 絵文字取得（DBから、なければデフォルト）
function getEmoji(name){
  const d = lookupDB(name);
  if(d && d.e) return d.e;
  return '🌸';
}

// Unsplash用英語クエリ
function toEn(name){
  const d = lookupDB(name);
  if(d && d.en) return d.en + ' flower';
  return name + ' flower';
}

// DBルックアップ（生データ）
function lookupDB(name){
  if(FLOWER_DB[name]) return FLOWER_DB[name];
  const kata = toKatakana(name), hira = toHiragana(name);
  for(const[k,v] of Object.entries(FLOWER_DB)){
    if(name.includes(k)||k.includes(name)) return v;
    if(toKatakana(k)===kata||toHiragana(k)===hira) return v;
  }
  return null;
}

// DB検索（返却形式を整形）
function lookupKotoba(name){
  const raw = lookupDB(name);
  if(!raw) return null;
  // キーを逆引き
  let matchKey = name;
  if(!FLOWER_DB[name]){
    for(const k of Object.keys(FLOWER_DB)){
      if(name.includes(k)||k.includes(name)||toKatakana(k)===toKatakana(name)){ matchKey=k; break; }
    }
  }
  return { nameJp: matchKey, nameEn: raw.en||'', keywords: raw.kw||[], description: raw.d||'', source:'内蔵DB' };
}

async function scrapeKotoba(name){ return lookupKotoba(name); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  🖼 Unsplash 画像取得（修正版）
//  crossOriginを除去・URLにパラメータ不要
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function fetchImages(name){
  if(!UNSPLASH_ACCESS_KEY || UNSPLASH_ACCESS_KEY==='YOUR_UNSPLASH_ACCESS_KEY_HERE') return [];
  try{
    const q = encodeURIComponent(toEn(name));
    const url = `https://api.unsplash.com/search/photos?query=${q}&per_page=6&orientation=squarish&client_id=${UNSPLASH_ACCESS_KEY}`;
    const r = await fetch(url);
    if(!r.ok){
      console.warn('Unsplash error:', r.status);
      return [];
    }
    const j = await r.json();
    if(!j.results || !j.results.length){ console.warn('Unsplash: no results'); return []; }
    return j.results.map(item=>({
      // small サイズを使用（CORSヘッダーが付いていて確実に表示できる）
      url:   item.urls.small,
      thumb: item.urls.thumb,
      credit: item.user.name,
      creditUrl: `${item.user.links.html}?utm_source=hanakotoba_app&utm_medium=referral`,
      photoUrl:  `${item.links.html}?utm_source=hanakotoba_app&utm_medium=referral`,
    }));
  }catch(e){
    console.warn('fetchImages error:', e);
    return [];
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  🎨 描画
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let currentFlower='', currentImages=[];
let favorites=[];
try{ favorites=JSON.parse(localStorage.getItem('hkfavs')||'[]'); }catch(e){}

window.addEventListener('load',()=>{
  renderFavs();
  document.getElementById('search-input').addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(); });
});

function quickSearch(name){ document.getElementById('search-input').value=name; doSearch(); }

async function doSearch(){
  const name = document.getElementById('search-input').value.trim();
  if(!name) return;
  currentFlower = name;
  setLoading(true); hideResult(); hideError();
  try{
    const [kRes, iRes] = await Promise.allSettled([scrapeKotoba(name), fetchImages(name)]);
    const kData = kRes.status==='fulfilled' ? kRes.value : null;
    const imgs  = iRes.status==='fulfilled' ? iRes.value : [];
    if(!kData || !kData.keywords.length){
      showError('この花はデータベースに登録されていません 🌿<br>別の花の名前や、カタカナ・ひらがなを試してみてください。');
      return;
    }
    currentImages = imgs;
    renderResult(name, kData, imgs);
  }catch(e){
    showError('エラーが発生しました：' + e.message);
  }finally{
    setLoading(false);
  }
}

function renderResult(name, kData, images){
  document.getElementById('flower-name-jp').textContent = kData.nameJp || name;
  document.getElementById('flower-name-en').textContent = kData.nameEn ? `( ${kData.nameEn} )` : '';
  document.getElementById('source-text').textContent = '出典：内蔵花言葉データベース（200種）';

  // 絵文字を初期表示
  document.getElementById('img-emoji').textContent = getEmoji(name);
  document.getElementById('img-emoji').style.display = 'block';
  document.getElementById('main-img').style.display = 'none';
  document.getElementById('photo-credit').innerHTML = '';

  // バッジ
  const bl = document.getElementById('kotoba-badges');
  bl.innerHTML = '';
  kData.keywords.forEach((kw,i)=>{
    const b = document.createElement('span');
    b.className='kotoba-badge'; b.textContent=kw;
    b.style.animationDelay = (i*.08)+'s';
    bl.appendChild(b);
  });
  document.getElementById('desc-box').textContent = kData.description;

  // サムネイル＆メイン画像
  const tr = document.getElementById('thumb-row');
  tr.innerHTML = '';
  if(images.length){
    setMainImage(images[0]);
    images.forEach((img,i)=>{
      const d = document.createElement('div');
      d.className = 'thumb' + (i===0?' active':'');
      d.onclick = ()=>selectThumb(i);
      const im = new Image();
      // サムネイルは crossOrigin なしで読み込む
      im.src = img.thumb;
      im.alt = '';
      im.onerror = ()=>{ d.style.display='none'; };
      d.appendChild(im);
      tr.appendChild(d);
    });
  }

  updateFavBtn();
  document.getElementById('result').style.display='block';
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
}

function setMainImage(img){
  const el  = document.getElementById('main-img');
  const em  = document.getElementById('img-emoji');
  const cr  = document.getElementById('photo-credit');

  // 絵文字を先に見せる
  em.style.display = 'block';
  el.style.display = 'none';

  // ★ crossOrigin は設定しない（設定するとCORSエラーになる）
  // ★ URLにパラメータを追加しない（Unsplashの署名付きURLを壊さない）
  const newImg = new Image();
  newImg.onload = ()=>{
    el.src = newImg.src;
    el.style.display = 'block';
    em.style.display  = 'none';
  };
  newImg.onerror = ()=>{
    // 画像読み込み失敗 → 絵文字のまま表示
    el.style.display = 'none';
    em.style.display = 'block';
    cr.innerHTML = '';
    console.warn('Image failed:', img.url);
  };
  newImg.src = img.url;

  // Unsplash利用規約：クレジット必須
  cr.innerHTML = `📷 <a href="${img.creditUrl}" target="_blank" rel="noopener">${img.credit}</a> on <a href="${img.photoUrl}" target="_blank" rel="noopener">Unsplash</a>`;
}

function selectThumb(i){
  document.querySelectorAll('.thumb').forEach((t,j)=>t.classList.toggle('active',i===j));
  setMainImage(currentImages[i]);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ♡ お気に入り
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toggleFav(){
  const i = favorites.indexOf(currentFlower);
  if(i===-1) favorites.push(currentFlower); else favorites.splice(i,1);
  try{ localStorage.setItem('hkfavs',JSON.stringify(favorites)); }catch(e){}
  updateFavBtn(); renderFavs();
}
function updateFavBtn(){
  const on = favorites.includes(currentFlower);
  document.getElementById('fav-icon').textContent  = on?'♥':'♡';
  document.getElementById('fav-label').textContent = on?'お気に入り済み！':'お気に入りに追加';
}
function renderFavs(){
  const sec = document.getElementById('fav-section');
  const lst = document.getElementById('fav-list');
  if(!favorites.length){ sec.style.display='none'; return; }
  sec.style.display='block'; lst.innerHTML='';
  favorites.forEach(name=>{
    const item=document.createElement('div'); item.className='fav-item';
    const lbl=document.createElement('span');
    lbl.textContent = getEmoji(name)+' '+name; lbl.onclick=()=>quickSearch(name);
    const rm=document.createElement('span'); rm.className='fav-remove'; rm.textContent='✕';
    rm.onclick=()=>removeFav(name);
    item.append(lbl,rm); lst.appendChild(item);
  });
}
function removeFav(name){
  favorites=favorites.filter(f=>f!==name);
  try{ localStorage.setItem('hkfavs',JSON.stringify(favorites)); }catch(e){}
  renderFavs(); if(currentFlower===name) updateFavBtn();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  その他
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function shareResult(){
  const text=`🌸 ${currentFlower}の花言葉を調べました！`;
  if(navigator.share) navigator.share({title:'花言葉しらべ',text});
  else{
    try{ navigator.clipboard.writeText(text+'\n'+location.href); alert('クリップボードにコピーしました！'); }
    catch(e){ alert('共有できませんでした。'); }
  }
}
function clearResult(){ hideResult(); document.getElementById('search-input').value=''; document.getElementById('search-input').focus(); currentFlower=''; }
function setLoading(b){ document.getElementById('loading').style.display=b?'block':'none'; }
function hideResult()  { document.getElementById('result').style.display='none'; }
function hideError()   { document.getElementById('error-box').style.display='none'; }
function showError(msg){ const e=document.getElementById('error-box'); e.innerHTML='😢 '+msg; e.style.display='block'; }
</script>
